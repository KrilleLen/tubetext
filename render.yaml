services:
  - type: web
    name: tubetext
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DOCS_ENABLED
        value: "false"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: EMBED_ALLOWED_ORIGINS
        sync: false
      - key: WEBSHARE_PROXY_USERNAME
        sync: false
      - key: WEBSHARE_PROXY_PASSWORD
        sync: false
      - key: WEBSHARE_PROXY_COUNTRIES
        value: se,de
      - key: YOUTUBE_PROXY_URL
        sync: false
